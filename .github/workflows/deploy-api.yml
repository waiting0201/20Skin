name: deploy-api

# API → Azure Functions（.NET 10 isolated, Flex Consumption）。只在 api/** 有變更時觸發。
# 登入走 OIDC federated credential（Azure/login@v2），不使用長期存活的 Service Principal 密碼。
# 一次性設定（federated credential + RBAC）見 docs/design/infrastructure.md §一次性手動步驟。

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: func-20skin-api-prod
  DOTNET_VERSION: '10.0.x'
  PUBLISH_DIR: ${{ github.workspace }}/publish_output

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC 換取 Azure token 必要
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore api/20Skin.slnx

      - name: Build
        run: dotnet build api/20Skin.slnx -c Release --no-restore

      - name: Publish API host project
        run: >
          dotnet publish api/20Skin.Api/_20Skin_Api.csproj
          -c Release --no-build
          -o "${{ env.PUBLISH_DIR }}"

      - name: Azure login (OIDC federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
          # 不提供 publish-profile：沿用上一步 azure/login 的 OIDC 工作階段做認證。

      - name: Azure logout
        if: always()
        run: az logout
